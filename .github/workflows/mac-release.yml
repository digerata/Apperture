name: Release Train

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to validate against, for example v0.1.0 or mac-v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "mac-v*"

concurrency:
  group: release-train-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-15
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      release_version: ${{ steps.validate.outputs.release_version }}
      full_train: ${{ steps.validate.outputs.full_train }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Validate tag and version
        id: validate
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_tag }}
          RELEASE_BRANCH: ${{ vars.RELEASE_BRANCH || 'master' }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG:-}"
          full_train="false"
          version=""

          if [[ -n "$tag" ]]; then
            case "$tag" in
              v*)
                full_train="true"
                version="${tag#v}"
                ;;
              mac-v*)
                full_train="false"
                version="${tag#mac-v}"
                ;;
              *)
                echo "Release tag must look like v1.2.3 or mac-v1.2.3. Got: $tag" >&2
                exit 1
                ;;
            esac

            if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
              echo "Release tag must contain a semantic version. Got: $tag" >&2
              exit 1
            fi

            git fetch origin "$RELEASE_BRANCH" --depth=1
            if ! git merge-base --is-ancestor HEAD "origin/$RELEASE_BRANCH"; then
              echo "Release tag $tag is not contained in origin/$RELEASE_BRANCH." >&2
              exit 1
            fi

            marketing_version="$(awk '/MARKETING_VERSION:/ { print $2; exit }' project.yml)"
            if [[ "$marketing_version" != "$version" ]]; then
              echo "Tag version $version does not match MARKETING_VERSION $marketing_version." >&2
              exit 1
            fi
          else
            echo "No release tag supplied; skipping tag/version validation for manual run."
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "full_train=$full_train" >> "$GITHUB_OUTPUT"

  build-mac:
    name: Build Notarized Mac DMG
    runs-on: macos-15
    needs: validate-release
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
      SPARKLE_FEED_URL: ${{ vars.SPARKLE_FEED_URL || secrets.SPARKLE_FEED_URL || 'https://runaperture.com/releases/appcast.xml' }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_ED_KEY }}
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${CERTIFICATE_BASE64:-}" ]]; then
            echo "DEVELOPER_ID_APPLICATION_CERT_BASE64 is not set" >&2
            exit 1
          fi
          if [[ -z "${P12_PASSWORD:-}" ]]; then
            echo "DEVELOPER_ID_APPLICATION_CERT_PASSWORD is not set" >&2
            exit 1
          fi
          if [[ -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "RELEASE_KEYCHAIN_PASSWORD is not set" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/apperture-release.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "Available code signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Developer ID Application"; then
            echo "No Developer ID Application identity with private key was found in the imported .p12." >&2
            exit 1
          fi

      - name: Build and notarize Mac app
        run: scripts/notarize-mac-release.sh

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: Apperture-mac-notarized
          path: |
            build/mac-release/artifacts/Apperture-*.dmg
            build/mac-release/artifacts/Apperture-*.dmg.sha256
          if-no-files-found: error

  upload-ios-testflight:
    name: Upload iOS TestFlight Build
    runs-on: macos-15
    needs: validate-release
    if: needs.validate-release.outputs.full_train == 'true'
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      IOS_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import Apple Distribution certificate
        run: |
          set -euo pipefail

          if [[ -z "${IOS_CERTIFICATE_BASE64:-}" ]]; then
            echo "APPLE_DISTRIBUTION_CERT_BASE64 is not set" >&2
            exit 1
          fi
          if [[ -z "${IOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "APPLE_DISTRIBUTION_CERT_PASSWORD is not set" >&2
            exit 1
          fi
          if [[ -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "RELEASE_KEYCHAIN_PASSWORD is not set" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/apperture-ios-release.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-distribution.p12"

          echo "$IOS_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "Available code signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Apple Distribution"; then
            echo "No Apple Distribution identity with private key was found in the imported .p12." >&2
            exit 1
          fi

      - name: Archive and upload iOS app
        run: scripts/upload-ios-testflight.sh

  publish-github-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download notarized DMG
        uses: actions/download-artifact@v4
        with:
          name: Apperture-mac-notarized
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/Apperture-*.dmg
            release-assets/Apperture-*.dmg.sha256
