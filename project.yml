name: Apperture
options:
  bundleIdPrefix: com.landmk1
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
settings:
  base:
    MARKETING_VERSION: 0.2.2
    SWIFT_VERSION: 5.0
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SPARKLE_FEED_URL: https://runaperture.com/releases/appcast.xml
    SPARKLE_PUBLIC_ED_KEY: ""
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.1
targets:
  AppertureMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/Mac
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.landmk1.apperture
        DEVELOPMENT_TEAM: VY76D5S364
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PRODUCT_NAME: Apperture
        CURRENT_PROJECT_VERSION: 4
        INFOPLIST_FILE: Sources/Mac/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_HARDENED_RUNTIME: YES
  AppertureiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.landmk1.apperture
        DEVELOPMENT_TEAM: VY76D5S364
        PRODUCT_NAME: Apperture
        CURRENT_PROJECT_VERSION: 4
        INFOPLIST_FILE: Sources/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/iOS/AppertureiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: Apperture-AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1,2"
